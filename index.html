<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpador de Orçamentos - Empresa</title>
    <!-- Ícone de Varinha Mágica na aba do navegador -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪄</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Cabeçalho -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-slate-900 flex items-center justify-center gap-2">
                <i data-lucide="wand-2" class="text-blue-600 w-8 h-8"></i>
                Limpador de Orçamentos
            </h1>
            <p class="text-slate-500">Formatação profissional para WhatsApp - Empresa</p>
        </div>

        <!-- Dados do Vendedor -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-4">
            <div class="flex items-center gap-2 text-blue-600 font-semibold shrink-0">
                <i data-lucide="user" class="w-5 h-5"></i>
                Vendedor:
            </div>
            <input type="text" id="vendedor" 
                class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all" 
                placeholder="Nome do vendedor (Ex: João Silva)">
        </div>

        <!-- Grade Principal -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <!-- Coluna 1: Entrada -->
            <div class="flex flex-col gap-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center">
                    <label class="font-semibold text-slate-700">Texto Bruto do Sistema</label>
                    <button onclick="clearAll()" class="text-slate-400 hover:text-red-500 flex items-center gap-1 text-sm transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Limpar
                    </button>
                </div>
                
                <textarea id="input" class="w-full h-80 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm transition-all" 
                    placeholder="Cole o orçamento bruto aqui..."></textarea>
                
                <button onclick="processBudget()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-colors active:scale-[0.98]">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    Limpar e Formatar
                </button>
            </div>

            <!-- Coluna 2: Saída -->
            <div class="flex flex-col gap-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative">
                <div class="flex justify-between items-center">
                    <label class="font-semibold text-slate-700">Resultado para WhatsApp</label>
                </div>

                <div id="error-container" class="hidden w-full h-80 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl flex flex-col items-center justify-center text-center text-sm gap-2">
                    <i data-lucide="alert-circle" class="w-8 h-8"></i>
                    <p id="error-message"></p>
                </div>

                <textarea id="output" class="w-full h-80 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none resize-none text-sm transition-all font-mono" 
                    placeholder="O texto limpo aparecerá aqui..."></textarea>

                <button id="copy-btn" onclick="copyToClipboard()" disabled class="w-full bg-green-600 hover:bg-green-700 text-white disabled:opacity-50 font-semibold py-3 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                    <i data-lucide="clipboard-copy" class="w-5 h-5"></i>
                    <span id="copy-text">Copiar para WhatsApp</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Inicializar ícones Lucide
        lucide.createIcons();

        function parseMoney(str) {
            if (!str) return 0;
            let clean = str.replace(/[^\d,-]/g, '');
            clean = clean.replace(',', '.');
            return parseFloat(clean) || 0;
        }

        function formatMoney(num) {
            return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            toggleError(false);
            document.getElementById('copy-btn').disabled = true;
        }

        function toggleError(show, msg = '') {
            const err = document.getElementById('error-container');
            const out = document.getElementById('output');
            if (show) {
                err.classList.remove('hidden');
                out.classList.add('hidden');
                document.getElementById('error-message').innerText = msg;
            } else {
                err.classList.add('hidden');
                out.classList.remove('hidden');
            }
        }

        function processBudget() {
            const input = document.getElementById('input').value;
            const vendedor = document.getElementById('vendedor').value.trim();
            if (!input.trim()) return;

            toggleError(false);
            const lines = input.split('\n').map(l => l.trim()).filter(l => l !== '');
            const items = [];
            let currentProduct = { name: '', variations: [] };
            let currentQty = '';
            let explicitTotal = 0;
            let sumTotal = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Filtros de linhas indesejadas
                if (
                    /Um Ticket por Pax/i.test(line) ||
                    /Data uso/i.test(line) ||
                    /Observaç/i.test(line) || 
                    /Sub-?total/i.test(line) ||
                    /^(Sim|Não|Nenhuma)$/i.test(line) ||
                    /^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(line) || 
                    /^[A-Za-zçáéíóúãõ]+, \d{1,2} de [A-Za-zçáéíóúãõ]+ de \d{4}$/i.test(line)
                ) continue;

                if (/^[\d.,]+$/.test(line)) continue;

                // Captura de valor Total do sistema
                if (/total/i.test(line)) {
                    let match = line.match(/R\$\s*([\d.,]+)/i);
                    if (match) {
                        explicitTotal = parseMoney(match[1]);
                    } else if (lines[i + 1] && /^\s*(R\$)?\s*[\d.,]+\s*$/.test(lines[i + 1])) {
                        explicitTotal = parseMoney(lines[i + 1]);
                    }
                    continue;
                }

                // Identifica linha combinada: Qtd x Tipo - (R$ Valor)
                let combinedMatch = line.match(/^(\d+\s*x\s*.*?)\s*[-]*\s*\(\s*(R\$\s*[\d.,]+)\s*\)$/i);
                if (combinedMatch) {
                    currentProduct.variations.push({
                        qty: combinedMatch[1].trim(),
                        value: `(${combinedMatch[2].trim()})`
                    });
                    sumTotal += parseMoney(combinedMatch[2]);
                    continue;
                }

                // Identifica apenas Quantidade
                let qtyMatch = line.match(/^(\d+\s*x\s*.*)$/i);
                if (qtyMatch && !line.includes('(R$')) {
                    currentQty = qtyMatch[1].trim();
                    continue;
                }

                // Identifica Valor entre parênteses
                let valMatch = line.match(/^\(\s*(R\$\s*[\d.,]+)\s*\)$/i);
                if (valMatch) {
                    if (currentQty) {
                        currentProduct.variations.push({
                            qty: currentQty,
                            value: `(${valMatch[1].trim()})`
                        });
                        sumTotal += parseMoney(valMatch[1]);
                        currentQty = '';
                    }
                    continue;
                }

                // Se não for nada acima, é o Nome do Produto
                if (currentProduct.variations.length > 0) {
                    items.push({ ...currentProduct });
                    currentProduct = { name: line, variations: [] };
                } else {
                    currentProduct.name = line;
                }
            }

            if (currentProduct.variations.length > 0) {
                items.push({ ...currentProduct });
            }

            if (items.length === 0) {
                toggleError(true, 'Não identificamos itens no texto colado. Verifique o padrão.');
                return;
            }

            // Gerar Data de Validade Automática
            const hoje = new Date();
            const diaMes = hoje.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

            // Início do Orçamento
            let outText = `Orçamento com validade até hoje [${diaMes}], preços dinâmicos com alterações sem aviso prévio 👇\n\n`;

            // Listagem de Itens e Variações
            outText += items.map(item => {
                let s = item.name ? item.name + '\n' : '';
                s += item.variations.map(v => `${v.qty} - ${v.value}`).join('\n');
                return s;
            }).join('\n\n');

            // Cálculo do Total Final e Rodapé
            const finalTotal = explicitTotal > 0 ? explicitTotal : sumTotal;
            outText += `\n\n*Total: R$ ${formatMoney(isNaN(finalTotal) ? 0 : finalTotal)}*`;
            
            // Inserção do Nome do Vendedor
            if (vendedor) {
                outText += `\n\n🪪 Feito por: *${vendedor}*`;
            }

            // Cálculo da Regra de Parcelamento (1x por cada R$ 100, max 10x)
            let parcelas = Math.floor(finalTotal / 100);
            if (parcelas < 1) parcelas = 1;
            if (parcelas > 10) parcelas = 10;

            outText += `\n\n💰 Parcelamento até ${parcelas}x sem juros ou no PIX`;

            document.getElementById('output').value = outText;
            document.getElementById('copy-btn').disabled = false;
        }

        function copyToClipboard() {
            const text = document.getElementById('output').value;
            const btn = document.getElementById('copy-btn');
            const btnText = document.getElementById('copy-text');
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                btn.classList.replace('bg-green-600', 'bg-green-100');
                btn.classList.add('text-green-700', 'border', 'border-green-200');
                btnText.innerText = 'Copiado!';
                setTimeout(() => {
                    btn.classList.replace('bg-green-100', 'bg-green-600');
                    btn.classList.remove('text-green-700', 'border', 'border-green-200');
                    btnText.innerText = 'Copiar para WhatsApp';
                }, 2000);
            } catch (err) {
                console.error('Falha ao copiar texto: ', err);
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
